[project]
name = "gpt-sovits-trainer"
version = "0.1.0"
description = "GPT-SoVITS s1/s2 training adapter for gpt-sovits-orchestrator"
readme = "README.md"
requires-python = "==3.10.*"
dependencies = [
    "einops>=0.8.0",
    "huggingface-hub>=0.28.1",
    "librosa>=0.10.2",
    "numpy>=1.26.4",
    "python-dotenv>=1.1.0",
    "soundfile>=0.13.1",
    "torch==2.7.0",
    "torchaudio==2.7.0",
    "torchmetrics>=1.6.0",
    "tqdm>=4.67.1",
    "x-transformers>=1.31.0",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

[project.scripts]
gpt-sovits-trainer = "gpt_sovits_trainer.main:main"
gpt-sovits-download-models = "gpt_sovits_trainer.download_models:main"

[build-system]
requires = ["uv_build>=0.11.14,<0.12.0"]
build-backend = "uv_build"
